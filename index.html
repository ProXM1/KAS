<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mystic Hold'em | Grand Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Quicksand:wght@500&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #f3cf7a;
            --dark-gold: #aa8939;
            --felt: radial-gradient(circle at center, #1a4a35 0%, #0d2b1e 100%);
            --glass: rgba(0, 0, 0, 0.6);
            --mana-glow: 0 0 20px rgba(243, 207, 122, 0.4);
        }

        body {
            background-color: #050505;
            color: #fff;
            font-family: 'Quicksand', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            perspective: 1200px;
        }

        /* The Magic Table */
        #game-container {
            position: relative;
            width: 1100px;
            height: 700px;
            background: var(--felt);
            border: 12px solid #222;
            border-radius: 400px / 280px;
            box-shadow: 
                0 50px 100px rgba(0,0,0,0.9),
                inset 0 0 100px rgba(0,0,0,0.8),
                0 0 0 4px var(--dark-gold);
            overflow: visible;
        }

        /* Decorative Runes on Table */
        #game-container::after {
            content: 'ᛟ ᚷ ᚨ ᛗ ᛖ ᛟ ᚠ ᛏ ᚺ ᚱ ᛟ ᚾ ᛖ ᛋ';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Cinzel Decorative';
            font-size: 140px;
            color: rgba(255, 255, 255, 0.03);
            white-space: nowrap;
            pointer-events: none;
        }

        /* Pot Area */
        #center-area {
            position: absolute;
            top: 45%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 5;
            text-align: center;
        }

        #pot-display {
            background: var(--glass);
            padding: 10px 30px;
            border-radius: 50px;
            border: 1px solid var(--dark-gold);
            font-family: 'Cinzel Decorative';
            font-size: 22px;
            color: var(--gold);
            margin-bottom: 25px;
            box-shadow: var(--mana-glow);
        }

        /* Cards */
        .card {
            width: 75px;
            height: 110px;
            position: absolute;
            transition: all 0.7s cubic-bezier(0.23, 1, 0.32, 1);
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.5));
        }

        .card-inner {
            position: relative;
            width: 100%; height: 100%;
            transform-style: preserve-3d;
            transition: transform 0.6s;
        }

        .card.flipped .card-inner { transform: rotateY(180deg); }

        .card-face {
            position: absolute;
            width: 100%; height: 100%;
            backface-visibility: hidden;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .card-back {
            background: linear-gradient(135deg, #1a0b2e 0%, #3a1c61 100%);
            border: 3px solid var(--gold);
            color: var(--gold);
            font-size: 30px;
        }

        .card-front {
            background: #fdfdfd;
            transform: rotateY(180deg);
            color: #111;
            font-weight: bold;
            font-size: 24px;
            border: 1px solid #ccc;
        }

        .card-front.red { color: #b30000; }

        /* Players UI */
        .player {
            position: absolute;
            width: 180px;
            transition: transform 0.3s ease;
        }

        .player.active .avatar {
            border-color: var(--gold);
            box-shadow: 0 0 25px var(--gold);
            transform: scale(1.1);
        }

        .avatar {
            width: 80px; height: 80px;
            border-radius: 50%;
            border: 3px solid #444;
            margin: 0 auto;
            background: #111;
            display: flex;
            align-items: center; justify-content: center;
            font-size: 40px;
            transition: all 0.4s;
        }

        .player-info {
            background: var(--glass);
            backdrop-filter: blur(5px);
            padding: 10px;
            border-radius: 15px;
            margin-top: 10px;
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
        }

        .player-name { font-family: 'Cinzel Decorative'; color: var(--gold); margin-bottom: 3px; }
        .player-chips { font-size: 13px; opacity: 0.8; }
        .player-action { height: 18px; font-size: 12px; color: var(--gold); font-style: italic; }

        /* Positioning */
        #player-0 { bottom: -60px; left: 50%; transform: translateX(-50%); }
        #player-1 { top: 40px; left: 60px; }
        #player-2 { top: 40px; right: 60px; }

        /* Action Bar */
        #action-bar {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            display: flex;
            gap: 15px;
            background: rgba(0,0,0,0.85);
            padding: 20px 40px;
            border-radius: 100px;
            border: 2px solid var(--dark-gold);
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1000;
        }

        #action-bar.visible { transform: translateX(-50%) translateY(0); }

        button {
            background: transparent;
            color: var(--gold);
            border: 1px solid var(--dark-gold);
            padding: 12px 25px;
            font-family: 'Cinzel Decorative';
            cursor: pointer;
            border-radius: 50px;
            transition: 0.3s;
        }

        button:hover:not(:disabled) {
            background: var(--gold);
            color: #000;
            box-shadow: 0 0 15px var(--gold);
        }

        #game-message {
            position: absolute;
            top: -60px; width: 100%;
            text-align: center;
            font-family: 'Cinzel Decorative';
            font-size: 32px;
            color: var(--gold);
            text-shadow: 0 0 20px rgba(0,0,0,1);
        }

        #deck {
            position: absolute;
            top: 20px; left: 50%;
            transform: translateX(-50%);
            width: 75px; height: 110px;
            background: #1a0b2e;
            border: 2px solid var(--gold);
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            opacity: 0.6;
        }

    </style>
</head>
<body>

    <div id="game-container">
        <div id="game-message">Entrance the Arena...</div>
        <div id="deck">⚡</div>

        <div id="center-area">
            <div id="pot-display">🏺 Pot: <span id="pot-amount">0</span></div>
            <div id="community-cards" style="display: flex; gap: 10px; height: 110px;"></div>
        </div>

        <!-- Players -->
        <div id="player-1" class="player">
            <div class="avatar">🧙‍♂️</div>
            <div class="player-info">
                <div class="player-name">Alaric</div>
                <div class="player-chips"><span id="p1-chips">1000</span> 🪙</div>
                <div id="p1-action" class="player-action"></div>
            </div>
            <div id="p1-cards" class="player-cards"></div>
        </div>

        <div id="player-2" class="player">
            <div class="avatar">🧝‍♀️</div>
            <div class="player-info">
                <div class="player-name">Sylas</div>
                <div class="player-chips"><span id="p2-chips">1000</span> 🪙</div>
                <div id="p2-action" class="player-action"></div>
            </div>
            <div id="p2-cards" class="player-cards"></div>
        </div>

        <div id="player-0" class="player">
            <div class="avatar">🔮</div>
            <div class="player-info">
                <div class="player-name">Hero</div>
                <div class="player-chips"><span id="p0-chips">1000</span> 🪙</div>
                <div id="p0-action" class="player-action"></div>
            </div>
            <div id="p0-cards" class="player-cards"></div>
        </div>
    </div>

    <!-- Interface -->
    <div id="action-bar">
        <button onclick="playerAction('fold')">Fold</button>
        <button id="btn-call" onclick="playerAction('call')">Call</button>
        <button onclick="playerAction('raise')">Raise 50</button>
        <button id="btn-next" onclick="startNewHand()" style="display:none; background: var(--gold); color: #000;">Next Hand</button>
    </div>

    <script>
        // Utilizing the logic from previous version with enhanced UI hooks
        const SUITS = ['♠', '♥', '♦', '♣'];
        const RANKS = ['2', '3', '4', '5', '6', '7', '8', '9', 'T', 'J', 'Q', 'K', 'A'];
        let deck = [], communityCards = [], pot = 0, currentBet = 0, activePlayerIndex = 0, stage = 'preflop';
        let players = [
            { id: 0, name: "Hero", chips: 1000, cards: [], currentBet: 0, folded: false, isHuman: true },
            { id: 1, name: "Alaric", chips: 1000, cards: [], currentBet: 0, folded: false, isHuman: false },
            { id: 2, name: "Sylas", chips: 1000, cards: [], currentBet: 0, folded: false, isHuman: false }
        ];

        function createDeck() {
            deck = [];
            for (let s of SUITS) for (let r of RANKS) deck.push({ suit: s, rank: r, color: (s === '♥' || s === '♦') ? 'red' : 'black' });
            deck.sort(() => Math.random() - 0.5);
        }

        function createCardElement(card, isHidden = true) {
            const el = document.createElement('div');
            el.className = `card ${!isHidden ? 'flipped' : ''}`;
            el.innerHTML = `
                <div class="card-inner">
                    <div class="card-face card-back">✨</div>
                    <div class="card-face card-front ${card.color}">
                        <div>${card.rank}</div>
                        <div style="font-size:40px">${card.suit}</div>
                    </div>
                </div>`;
            const deckRect = document.getElementById('deck').getBoundingClientRect();
            el.style.left = `${deckRect.left}px`;
            el.style.top = `${deckRect.top}px`;
            document.body.appendChild(el);
            return el;
        }

        async function animateTo(el, targetSelector, xOffset = 0, yOffset = 0) {
            const target = document.querySelector(targetSelector);
            const rect = target.getBoundingClientRect();
            el.style.left = `${rect.left + xOffset}px`;
            el.style.top = `${rect.top + yOffset}px`;
            return new Promise(r => setTimeout(r, 600));
        }

        async function startNewHand() {
            document.querySelectorAll('.card').forEach(c => c.remove());
            document.getElementById('btn-next').style.display = 'none';
            players.forEach(p => { p.cards = []; p.folded = false; p.currentBet = 0; document.getElementById(`p${p.id}-action`).innerText = ""; });
            communityCards = []; pot = 0; currentBet = 20; stage = 'preflop';
            createDeck(); updateUI();
            
            setMessage("Dealing Fate...");
            for(let i=0; i<2; i++) {
                for(let p of players) {
                    const data = deck.pop(); p.cards.push(data);
                    const cardEl = createCardElement(data, !p.isHuman);
                    await animateTo(cardEl, `#p${p.id}-cards`, i*30, -40);
                    if(p.isHuman) cardEl.classList.add('flipped');
                }
            }
            activePlayerIndex = 0;
            progressTurn();
        }

        function updateUI() {
            document.getElementById('pot-amount').innerText = pot;
            players.forEach(p => {
                document.getElementById(`p${p.id}-chips`).innerText = p.chips;
                document.getElementById(`player-${p.id}`).classList.toggle('active', activePlayerIndex === p.id);
                if(p.folded) document.getElementById(`player-${p.id}`).style.opacity = "0.4";
                else document.getElementById(`player-${p.id}`).style.opacity = "1";
            });
        }

        function setMessage(m) { document.getElementById('game-message').innerText = m; }

        function progressTurn() {
            updateUI();
            const activeCount = players.filter(p => !p.folded).length;
            if (activeCount === 1) return resolveWinner();

            const p = players[activePlayerIndex];
            if (p.folded) return nextPlayer();

            if (p.isHuman) {
                document.getElementById('action-bar').classList.add('visible');
                document.getElementById('btn-call').innerText = p.currentBet === currentBet ? "Check" : "Call";
            } else {
                document.getElementById('action-bar').classList.remove('visible');
                setTimeout(botMove, 1000);
            }
        }

        function nextPlayer() {
            activePlayerIndex = (activePlayerIndex + 1) % 3;
            // Check if betting round ends
            const allMatched = players.filter(pl => !pl.folded).every(pl => pl.currentBet === currentBet);
            if (allMatched && activePlayerIndex === 0) return nextStage();
            progressTurn();
        }

        function playerAction(type) {
            const p = players[0];
            if (type === 'fold') p.folded = true;
            if (type === 'call') { const diff = currentBet - p.currentBet; p.chips -= diff; pot += diff; p.currentBet = currentBet; }
            if (type === 'raise') { const diff = (currentBet + 50) - p.currentBet; p.chips -= diff; pot += diff; currentBet += 50; p.currentBet = currentBet; }
            document.getElementById(`p0-action`).innerText = type.toUpperCase();
            nextPlayer();
        }

        function botMove() {
            const p = players[activePlayerIndex];
            const diff = currentBet - p.currentBet;
            p.chips -= diff; pot += diff; p.currentBet = currentBet;
            document.getElementById(`p${p.id}-action`).innerText = diff === 0 ? "CHECK" : "CALL";
            nextPlayer();
        }

        async function nextStage() {
            players.forEach(p => p.currentBet = 0); currentBet = 0;
            if (stage === 'preflop') { stage = 'flop'; await dealComm(3); }
            else if (stage === 'flop') { stage = 'turn'; await dealComm(1); }
            else if (stage === 'turn') { stage = 'river'; await dealComm(1); }
            else return resolveWinner();
            activePlayerIndex = 0;
            progressTurn();
        }

        async function dealComm(n) {
            for(let i=0; i<n; i++) {
                const data = deck.pop(); communityCards.push(data);
                const el = createCardElement(data, false);
                await animateTo(el, '#community-cards', (communityCards.length-1)*85, 0);
                el.classList.add('flipped');
            }
        }

        function resolveWinner() {
            setMessage("Showdown!");
            document.querySelectorAll('.card').forEach(c => c.classList.add('flipped'));
            document.getElementById('btn-next').style.display = 'block';
            document.getElementById('action-bar').classList.add('visible');
            // Simplified winner logic for demo
            const winner = players.find(p => !p.folded);
            winner.chips += pot;
            setMessage(`${winner.name} claims the Pot!`);
            pot = 0; updateUI();
        }

        window.onload = startNewHand;
    </script>
</body>
</html>
